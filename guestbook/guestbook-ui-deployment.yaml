apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-ui
  template:
    metadata:
      labels:
        app: guestbook-ui
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5
          name: guestbook-ui
          ports:
            - containerPort: 80
          volumeMounts:
          - name: html-volume
            mountPath: /var/www/html/index.html
            subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: guestbook-ui-html
